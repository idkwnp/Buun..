<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buuñ 2D</title>
    <style>
        /* CSS EXACTAMENTE IGUAL AL ORIGINAL */
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; transition: filter 0.3s; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #header { position: absolute; top: 10px; width: 100%; text-align: center; color: #f1c40f; font-size: 24px; text-shadow: 3px 3px #c0392b; }
        
        #parca-alert { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); color: #8e44ad; font-size: 35px; text-shadow: 3px 3px #000; display: none; z-index: 20; text-transform: uppercase; }
        #boss-alert { position: absolute; top: 75px; left: 50%; transform: translateX(-50%); color: #ff0000; font-size: 30px; text-shadow: 3px 3px #000; display: none; z-index: 15; text-transform: uppercase; }
        #infection-timer { position: absolute; top: 110px; left: 20px; color: #e74c3c; font-size: 40px; display: none; text-shadow: 2px 2px #000; }

        #bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 90px; background: linear-gradient(0deg, #111 0%, #222 100%); border-top: 4px solid #f1c40f; display: flex; justify-content: space-around; align-items: center; color: #fff; pointer-events: auto; }
        .stat-box { text-align: center; border: 2px solid #f1c40f; padding: 5px 15px; background: rgba(0,0,0,0.8); min-width: 110px; }
        .stat-label { font-size: 10px; display: block; color: #f1c40f; }
        .stat-num { font-size: 28px; font-weight: bold; }
        #cd-display { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); color: #f1c40f; font-size: 14px; text-shadow: 2px 2px #000; text-align: center; }
        #bars-container { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 200px; display: flex; flex-direction: column; gap: 5px; }
        #weapon-bar-container { position: absolute; bottom: 100px; right: 6.5%; width: 110px; display: flex; flex-direction: column; gap: 5px; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border: 1px solid #000; pointer-events: none; }
        #dash-bar { width: 100%; height: 100%; background: #fff; }
        #shield-bar { width: 100%; height: 100%; background: #0088ff; }
        #weapon-bar { width: 100%; height: 100%; background: #2ecc71; }
        #msg-console { position: absolute; top: 50px; left: 20px; color: #2ecc71; font-size: 12px; font-family: 'Courier New'; text-shadow: 1px 1px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); border: 2px solid #2ecc71; border-radius: 50%; }
        #flash { position: absolute; width: 100%; height: 100%; background: #e74c3c; opacity: 0; pointer-events: none; }
        #pause-menu { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 9999; color: white; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; backdrop-filter: blur(8px); filter: none !important; }
        .pause-box { background: #111; padding: 25px; border: 3px solid #f1c40f; text-align: center; width: 420px; }
        .setting-row { margin: 12px 0; text-align: left; }
        label { font-size: 12px; color: #f1c40f; text-transform: uppercase; }
        select, input[type="range"] { width: 100%; background: #222; color: #fff; border: 1px solid #f1c40f; padding: 6px; margin-top: 5px; }
        #resume-btn { background: #2ecc71; border: none; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; color: #000; font-size: 16px; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px); overflow-y: auto; }
        .mode-btn { background: #111; color: #f1c40f; border: 2px solid #f1c40f; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; margin-top: 8px; width: 100%; }
        .mode-btn:hover { background: #f1c40f; color: #000; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="pause-box">
            <h2 style="color:#f1c40f; margin-top:0;">Buuñ 2D: Spin-Off</h2>
            <button class="mode-btn" style="border-color: #008f39; color: #008f39;" onclick="startGame('normal')">Normal</button>
            <button class="mode-btn" style="border-color: #ff0000; color: #ff0000;" onclick="startGame('extreme')">Super Mega Duper Extreme demon😈</button>
            <button class="mode-btn" style="border-color: #e62e1b; color: #e62e1b;" onclick="startGame('double')">Double trouble</button>
            <button class="mode-btn" style="border-color: #ff8000; color: #ff8000;" onclick="startGame('lava')">El piso es lava</button>
            <button class="mode-btn" style="border-color: #ffffff; color: #ffffff;" onclick="startGame('dyd')">Dye of Deaf</button>
            <button class="mode-btn" style="border-color: #e74c3c; color: #e74c3c;" onclick="startGame('un-toque')">Un toque (1 HP)</button>
            <button class="mode-btn" style="border-color: #2ecc71; color: #2ecc71;" onclick="startGame('infection')">Infection (Reloj)</button>
            <button class="mode-btn" style="border-color: #ff66b2; color: #ff66b2;" onclick="startGame('april-normal')">""normal""</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="game-ui">
        <div id="flash"></div>
        <div id="header">Buuñ 2D</div>
        <div id="parca-alert">EL DUO DE LA PARCA SPAWNEO</div>
        <div id="boss-alert">BOSS SPAWNEO</div>
        <div id="infection-timer">30</div>
        <div id="cd-display">COOLDOWN ARMA: <span id="cd-val">0.75</span>s</div>
        
        <div id="bars-container">
            <div class="bar-bg" title="Dash (SHIFT)"><div id="dash-bar"></div></div>
            <div class="bar-bg" title="Escudo (Q)"><div id="shield-bar"></div></div>
        </div>

        <div id="weapon-bar-container">
            <div class="bar-bg" title="Cooldown Botis"><div id="weapon-bar"></div></div>
        </div>

        <div id="msg-console">
            > MANTENER CLICK 1: DISPARAR | CLICK 2: ZOOM<br>
            > SHIFT: DASH CORTO | Q: ESCUDO TEMP | E: CURAR<br>
            > ESC: AJUSTES
        </div>
        <div id="crosshair"></div>
        <div id="bottom-bar">
            <div class="stat-box"><span class="stat-label">DAÑO</span><span id="dmg-val" class="stat-num">25</span></div>
            <div class="stat-box"><span class="stat-label">HP</span><span id="hp-val" class="stat-num">150</span></div>
            <div class="stat-box"><span class="stat-label">KILLS</span><span id="kills-val" class="stat-num">0</span></div>
            <div class="stat-box" style="border-color: #2ecc71;"><span class="stat-label">BOTIS</span><span id="med-val" class="stat-num">0</span></div>
        </div>
    </div>

    <div id="pause-menu">
        <div class="pause-box">
            <h2 style="color:#f1c40f; margin-top:0;">MENÚ DE PAUSA</h2>
            <div class="setting-row">
                <label>ZOOM</label>
                <input type="range" id="fov-slider" min="45" max="55" value="50">
            <div class="setting-row">
                <label>SKIN (SYNC)</label>
                <select id="skin-select">
                    <option value="default">Original</option>
                    <option value="neon">Neon (Verde)</option>
                    <option value="gold">Oro (Midas)</option>
                    <option value="lava">Lava (Fuego)</option>
                    <option value="void">Ender (Morado)</option>
                    <option value="kawaii">Kawaii (Rosa)</option>
                    <option value="retro">#SoRetro</option>
                    <option value="retro_2">#SoRetro²</option>
                    <option value="retro_1_5">#SoRetro a la 1.5</option>
                    <option value="invertido">Invertido (Locura total)</option>
                    <option value="rgb">Skin RGB</option>
                    <option value="holograma">Skin Holograma</option>
                    <option value="racism" style="background-color: #ff66b2; color: #000;">Say no to racism</option>
                    <option value="gemininopuedemas" style="background-color: #ff0000; color: #000;">ERROR</option>
<option value="argentinapapa" style="background-color: #75aadb; color: #000;">Argentina</option>
                </select>
            </div>
            <div class="setting-row">
                <label>HORARIO</label>
                <select id="time-select">
                    <option value="night">Noche</option>
                    <option value="day">Día</option>
                </select>
            </div>
            <button id="resume-btn">GUARDAR Y VOLVER</button>
        </div>
    </div>

    <script>
        // Mismos audios
        const gameMusic = new Audio('ONEBOUNCE.mp3.mp3'); gameMusic.loop = true; gameMusic.volume = 0.25;
        const shopMusic = new Audio('ScrappedEmoteShopTheme.mp3.mp3'); shopMusic.loop = true; shopMusic.volume = 0.25;
        const audioBlockHit = new Audio('BlockHit.mp3.mp3');

        // Configuración de Canvas 2D
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        // Convertidor Hex a CSS Color
        function hexToColor(hex) { return '#' + hex.toString(16).padStart(6, '0'); }

        // Mismas Skins
        const skinColors = {
            default: { enemy: 0xe74c3c, stalker: 0xff8888, player: 0x0a1a3a, eye: 0x00ffff, gun: 0x333333, atomic: 0xff0000 }, 
            neon: { enemy: 0x00ff00, stalker: 0x88ff88, player: 0x002222, eye: 0x00ff00, gun: 0x00ff00, atomic: 0xff00ff },
            gold: { enemy: 0xffffff, stalker: 0xdddddd, player: 0x221100, eye: 0xffd700, gun: 0xffd700, atomic: 0xffffff },
            lava: { enemy: 0xff4500, stalker: 0xffaa00, player: 0x110000, eye: 0xff0000, gun: 0x441100, atomic: 0xffff00 },
            void: { enemy: 0x8e44ad, stalker: 0xdabfff, player: 0x05000a, eye: 0xff00ff, gun: 0x8e44ad, atomic: 0x00ffff },
            kawaii: { enemy: 0xff69b4, stalker: 0xffc0cb, player: 0xffffff, eye: 0xff1493, gun: 0xffb6c1, atomic: 0xffffff },
            retro: { enemy: 0xff0000, stalker: 0xffaaaa, player: 0x330000, eye: 0xffff00, gun: 0x222222, atomic: 0x0000ff }, 
            retro_2: { enemy: 0x7f2a1f, stalker: 0xcc8888, player: 0x330000, eye: 0x444400, gun: 0x222222, atomic: 0x0000ff }, 
            retro_1_5: { enemy: 0x000000, stalker: 0x333333, player: 0x111111, eye: 0x444444, gun: 0x111111, atomic: 0xffffff },
            invertido: { enemy: 0x888888, stalker: 0xcccccc, player: 0x888888, eye: 0x888888, gun: 0x888888, atomic: 0x000000 },
            racism: { enemy: 0xe74c3c, stalker: 0xe74c3c, player: 0xe74c3c, eye: 0xe74c3c, gun: 0xe74c3c, atomic: 0xe74c3c },
            gemininopuedemas: { enemy: 0x000000, stalker: 0x4e545c, player: 0x1b1b1b, eye: 0x000000, gun: 0x000000, atomic: 0x8d9797 },
argentinapapa: { enemy: 0x75aadb, stalker: 0xfcbf45, player: 0x843511, eye: 0xffffff, gun: 0xffffff, atomic: 0xffffff }
        };

        // Lógica Global Adaptada
        let player = { x: 0, y: 0, radius: 15, angle: 0, hp: 150, kills: 0, dmg: 25, medkits: 0, lastShot: 0, cooldown: 750, isAiming: false }; 
        let enemyBaseHp = 150; 
        let enemies = [], bullets = [], structures = [], particles = [], chests = [], keys = {};
        
        let mouse = { x: 0, y: 0 };
        let camera = { x: 0, y: 0, zoom: 1, targetZoom: 1 };
        
        let currentSkin = 'default', isPaused = true, isExtremeMode = false;
        let currentGameMode = 'normal';
        let gameStarted = false, isShooting = false, shakeIntensity = 0;
        
        let canDash = true; const dashCooldownTime = 1700; let dashAnimationStartTime = -dashCooldownTime; 
        let isShieldActive = false; const shieldDuration = 10000, shieldCooldown = 20000; let shieldActivationTime = -shieldCooldown;
        let lastPassiveSpawn = Date.now(), lastMedkitTime = 0;
        let infectionTime = 30, infectionInterval = null;
        let killedNormalBoss = false, killedAtomic = false, killedStalkerBoss = false;
        let mapSize = 2000; // Arena de -1000 a 1000
        let bgColor = hexToColor(0x05050a), floorColor = hexToColor(0x111122), structColor = hexToColor(0x1a1a2e);

        // Inicializar Mundo 2D
        function initWorld() {
            structures = [];
            for(let i=0; i<45; i++) {
                structures.push({
                    x: (Math.random() * mapSize) - (mapSize/2),
                    y: (Math.random() * mapSize) - (mapSize/2),
                    w: 60 + Math.random() * 40,
                    h: 60 + Math.random() * 40
                });
            }
            setSafePlayerSpawn();
        }

        function setSafePlayerSpawn() {
            let safeSpawn = false;
            while(!safeSpawn) {
                player.x = (Math.random() * 400) - 200;
                player.y = (Math.random() * 400) - 200;
                safeSpawn = true;
                for(let wall of structures) {
                    if(rectIntersect(player.x-15, player.y-15, 30, 30, wall.x-wall.w/2, wall.y-wall.h/2, wall.w, wall.h)) {
                        safeSpawn = false; break;
                    }
                }
            }
        }

        function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x2 < x1+w1 && x2+w2 > x1 && y2 < y1+h1 && y2+h2 > y1;
        }

        // Alertas
        function triggerBossAlert() {
            const alert = document.getElementById('boss-alert'); alert.style.display = 'block';
            setTimeout(() => { alert.style.display = 'none'; }, 2000); 
        }

        function spawnDuoParca(basePos) {
            document.getElementById('parca-alert').style.display = 'block';
            setTimeout(() => { document.getElementById('parca-alert').style.display = 'none'; }, 2000);
            let pX = basePos ? basePos.x : (Math.random()*400-200);
            let pY = basePos ? basePos.y : (Math.random()*400-200);
            createStalkaze(true, pX, pY);
            createStalkaze(false, pX + 50, pY + 50);
        }

        function createStalkaze(isBossVariant, x, y) {
            let mult = isBossVariant ? 2.5 : 1; 
            let hp = isBossVariant ? (isExtremeMode ? 50 * player.dmg : 30 * player.dmg) : (isExtremeMode ? 750 : 575);
            if (currentGameMode === 'un-toque') hp = 1;
            enemies.push({
                x: x, y: y,
                radius: 15 * mult,
                angle: 0,
                hp: hp,
                isBoss: isBossVariant, isStalkazeBoss: isBossVariant, isStalkazeMinion: !isBossVariant,
                baseSpeed: isBossVariant ? 4.5 : 7.0,
                speed: isBossVariant ? 4.5 : 7.0,
                lastShot: 0,
                meleeDmg: isExtremeMode ? 9999 : 80,
                hitRadius: isBossVariant ? 35 : 20,
                colorHex: 0x8e44ad,
                mult: mult
            });
        }

        function getEnemyStats(boss, isStalker, isImmortal, isSmall, isKamikaze = false, isAtomic = false, isStalkerBoss = false, isSniper = false) {
            let hp;
            if (isSniper) hp = isExtremeMode ? 250 : 200;
            else if (isAtomic) hp = 500 + (player.kills * 20);
            else if (isStalkerBoss) hp = player.dmg * 20;
            else if (isKamikaze) hp = isExtremeMode ? (100 + player.kills * 15) : (50 + player.kills * 15);
            else if (boss) hp = isExtremeMode ? player.dmg * (20 + player.kills * 10) : player.dmg * (10 + player.kills * 5);
            else if (isStalker) hp = isImmortal ? Infinity : (isExtremeMode ? 250 : 175);
            else hp = isExtremeMode ? 200 : enemyBaseHp;
            if (currentGameMode === 'un-toque') hp = 1;
            
            let normalSpeed = boss ? 0.5 : (isSmall ? 1.5 : 1.0); // Ajustado para 2D
            if (isImmortal) normalSpeed = 5.2; 
            if (isAtomic) normalSpeed = 3.0;
            if (isKamikaze) normalSpeed = 6.0;
            if (isStalkerBoss) normalSpeed = 1.5;
            if (isSniper) normalSpeed = 0;
            
            let finalSpeed = isStalker ? normalSpeed * 5.1 : normalSpeed; 
            let meleeDmg = (currentGameMode === 'un-toque') ? 999 : (isExtremeMode && isStalker ? 60 : 30);
            if (currentGameMode === 'dyd') meleeDmg = 50;
            
            return { 
                hp: hp, isBoss: boss || isAtomic || isStalkerBoss, isStalker: isStalker || isStalkerBoss, 
                isImmortal: isImmortal, isSmall: isSmall, isKamikaze: isKamikaze || isAtomic, 
                isAtomic: isAtomic, isStalkerBoss: isStalkerBoss, isSniper: isSniper, speed: finalSpeed, lastShot: 0, 
                lastMelee: 0, meleeDmg: meleeDmg, aimStart: 0
            };
        }

        function spawnEnemy(boss = false, isImmortal = false, spawnPosX = null, spawnPosY = null, isSmall = false, parentData = null) {
            if (isExtremeMode && Math.random() < 0.20 && !isImmortal && !isSmall && !parentData) boss = true;
            if (boss && !parentData && killedNormalBoss && killedAtomic && killedStalkerBoss && Math.random() < 0.35) {
                spawnDuoParca({x: spawnPosX, y: spawnPosY}); return;
            }
            let isAtomic = false, isStalkerBoss = false, isKamikaze = false, isStalker = false, isSniper = false;
            if (parentData) {
                isStalker = parentData.isStalker; isKamikaze = parentData.isKamikaze;
                isAtomic = parentData.isAtomic; isStalkerBoss = parentData.isStalkerBoss;
            } else {
                let spawnRoll = Math.random();
                if (!boss && !isImmortal && !isSmall) {
                    let hasSniper = enemies.some(e => e.isSniper);
                    if (!hasSniper && Math.random() < 0.15) isSniper = true;
                    else if (spawnRoll < 0.30) isKamikaze = true;
                    else if (spawnRoll < 0.55) isStalker = true;
                }
                if (boss && Math.random() < 0.3) { if (Math.random() < 0.5) isAtomic = true; else isStalkerBoss = true; }
            }
            if (boss || isAtomic || isStalkerBoss) triggerBossAlert();
            
            let mult = (boss || isStalkerBoss || isAtomic) ? 2.5 : (isSmall ? 0.5 : 1);
            let x = spawnPosX !== null ? spawnPosX : (Math.random()*mapSize - mapSize/2);
            let y = spawnPosY !== null ? spawnPosY : (Math.random()*mapSize - mapSize/2);
            let targetStruct = null;

            if (isSniper) {
                targetStruct = structures[Math.floor(Math.random() * structures.length)];
                x = targetStruct.x; y = targetStruct.y;
            }
            
            let stats = getEnemyStats(boss, isStalker, isImmortal, isSmall, isKamikaze, isAtomic, isStalkerBoss, isSniper);
            
            enemies.push({
                x: x, y: y, radius: 15 * mult, mult: mult, angle: 0,
                colorHex: 0xff0000,
                targetStruct: targetStruct, hitRadius: (boss ? 35 : 20) * mult,
                ...stats
            });
        }

        function spawnChest() {
            let valid = false, px, py, attempts = 0;
            while(!valid && attempts < 20) { 
                px = Math.random()*mapSize - mapSize/2; 
                py = Math.random()*mapSize - mapSize/2; 
                valid = true; 
                for(let wall of structures) {
                    if(rectIntersect(px-10, py-10, 20, 20, wall.x-wall.w/2, wall.y-wall.h/2, wall.w, wall.h)) { valid = false; break; }
                }
                attempts++; 
            }
            chests.push({x: px, y: py, radius: 15});
        }

        function createDeathParticles(x, y, colorHex) {
            for(let i=0; i<8; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    life: 1.0, color: colorHex
                });
            }
        }

        function fireBullet(isEnemy = false, originX = null, originY = null, dirX = null, dirY = null, isBossBullet = false, isSniperBullet = false) {
            if(!isEnemy && (currentGameMode === 'dyd' || currentGameMode === 'april-normal')) return;
            
            let bx, by, vx, vy;
            if(!isEnemy) {
                bx = player.x; by = player.y;
                let angle = player.angle;
                vx = Math.cos(angle) * 15; vy = Math.sin(angle) * 15;
                player.lastShot = Date.now();
                shakeIntensity = 5;
            } else {
                bx = originX; by = originY;
                let speed = isSniperBullet ? 20 : 8;
                vx = dirX * speed; vy = dirY * speed;
            }

            bullets.push({
                x: bx, y: by, vx: vx, vy: vy,
                radius: isBossBullet ? 12 : (isSniperBullet ? 5 : 7),
                isEnemy: isEnemy, isBossBullet: isBossBullet, isSniperBullet: isSniperBullet,
                startTime: Date.now()
            });
        }

        function applySettings() {
            const time = document.getElementById('time-select').value;
            if(time === 'day') { bgColor = hexToColor(0x87ceeb); } 
            else { bgColor = hexToColor(0x05050a); }
            
            currentSkin = document.getElementById('skin-select').value;
            document.body.style.filter = (currentSkin === 'invertido') ? "invert(1)" : "none";
            
            floorColor = hexToColor(0x111122); structColor = hexToColor(0x1a1a2e);
            if (currentGameMode === 'lava') floorColor = hexToColor(0xcc1100);
            if (currentSkin === 'lava') { floorColor = hexToColor(0xcc1100); structColor = hexToColor(0x550000); }
        }

        function startGame(mode) {
            currentGameMode = mode; isExtremeMode = (mode === 'extreme');
            gameStarted = true; isPaused = false;
            document.getElementById('start-screen').style.display = 'none';
            enemies = []; bullets = []; particles = []; chests = [];
            
            initWorld();
            player.hp = (currentGameMode === 'un-toque') ? 1 : 150;
            player.kills = 0; player.dmg = 25; player.medkits = 0;
            
            if (currentGameMode === 'infection' || currentGameMode === 'april-normal') {
                infectionTime = (currentGameMode === 'april-normal') ? 150 : 30;
                document.getElementById('infection-timer').style.display = 'block';
                if(infectionInterval) clearInterval(infectionInterval);
                infectionInterval = setInterval(() => {
                    if (!isPaused && gameStarted) {
                        infectionTime--; 
                        let mins = Math.floor(infectionTime / 60); let secs = infectionTime % 60;
                        document.getElementById('infection-timer').innerText = (currentGameMode === 'april-normal') ? mins + ":" + (secs < 10 ? "0"+secs : secs) : infectionTime;
                        if (infectionTime <= 0) { 
                            if (currentGameMode === 'april-normal') alert("PERDISTE: No lograste morir a tiempo.");
                            player.hp = 0; updateUI(); 
                        }
                    }
                }, 1000);
            }

            if (mode !== 'dyd') { gameMusic.currentTime = 0; gameMusic.play(); } else { gameMusic.pause(); }
            
            if (mode !== 'dyd' && mode !== 'april-normal') { 
                for(let i=0; i<6; i++) spawnEnemy(); 
            } else { 
                if (mode === 'dyd' || mode === 'april-normal') spawnEnemy(false, true); 
            }
            if (mode === 'lava') { setInterval(() => { if (!isPaused && player.hp > 0 && !isShieldActive) { player.hp -= 10; triggerFlash(0.3); updateUI(); } }, 1000); }
            
            for(let i=0; i<5; i++) spawnChest();
            
            applySettings(); lastPassiveSpawn = Date.now(); updateUI();
        }

        function triggerFlash(opacity, duration = 100, color = '#e74c3c') { 
            const flash = document.getElementById('flash'); 
            flash.style.background = color; flash.style.opacity = opacity; setTimeout(() => flash.style.opacity = 0, duration); 
        }

        function updateUI() {
            if (currentGameMode === 'un-toque' && player.hp > 0) player.hp = 1;
            document.getElementById('hp-val').innerText = Math.round(player.hp);
            document.getElementById('kills-val').innerText = player.kills;
            document.getElementById('med-val').innerText = (currentGameMode === 'dyd') ? player.medkits + "/15" : player.medkits;
            document.getElementById('dmg-val').innerText = Math.round(player.dmg);
            document.getElementById('cd-val').innerText = (player.cooldown / 1000).toFixed(2);
            if(currentGameMode === 'dyd' && player.medkits >= 15) { alert("¡VICTORIA!"); location.reload(); }
            if(player.hp <= 0) { 
                if (currentGameMode === 'april-normal') alert("¡GANASTE! Lograste morir.");
                gameMusic.pause(); if(infectionInterval) clearInterval(infectionInterval); location.reload(); 
            }
        }

        function resumeGame() {
            isPaused = false; document.getElementById('pause-menu').style.display = 'none';
            applySettings(); shopMusic.pause();
            if (currentGameMode !== 'dyd') { gameMusic.play(); }
        }

        // Entradas
        window.addEventListener('mousedown', e => { 
            if(!gameStarted || isPaused) return; 
            if(e.button === 0) { isShooting = true; if(Date.now() - player.lastShot > player.cooldown) fireBullet(false); } 
            if(e.button === 2) player.isAiming = true; 
        });
        window.addEventListener('mouseup', e => { if(e.button === 0) isShooting = false; if(e.button === 2) player.isAiming = false; });
        window.addEventListener('contextmenu', e => e.preventDefault());
        
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            document.getElementById('crosshair').style.left = mouse.x + 'px';
            document.getElementById('crosshair').style.top = mouse.y + 'px';
        });

        window.addEventListener('keydown', e => {
            if(e.code === 'Escape' && gameStarted) {
                if(!isPaused) { isPaused = true; document.getElementById('pause-menu').style.display = 'flex'; gameMusic.pause(); shopMusic.play(); } 
                else resumeGame();
            }
            if(e.code === 'KeyE' && player.medkits > 0 && currentGameMode !== 'dyd' && currentGameMode !== 'april-normal') { 
                let medkitCooldown = (currentGameMode === 'lava') ? 2000 : 5000;
                if (Date.now() - lastMedkitTime >= medkitCooldown) { player.hp = Math.min(150, player.hp + 50); player.medkits--; updateUI(); lastMedkitTime = Date.now(); }
            }
            if(e.code === 'KeyQ' && currentGameMode !== 'dyd') { if (Date.now() - shieldActivationTime > shieldCooldown) { isShieldActive = true; shieldActivationTime = Date.now(); } }
            if(e.code === 'ShiftLeft' && canDash) { 
                let dx = 0, dy = 0;
                if(keys['KeyW']) dy -= 1; if(keys['KeyS']) dy += 1;
                if(keys['KeyA']) dx -= 1; if(keys['KeyD']) dx += 1;
                if(dx !== 0 || dy !== 0) {
                    let len = Math.sqrt(dx*dx + dy*dy);
                    let targetX = player.x + (dx/len)*150;
                    let targetY = player.y + (dy/len)*150;
                    
                    // Colisión progresiva del Dash
                    let steps = 10;
                    let stepX = (targetX - player.x) / steps;
                    let stepY = (targetY - player.y) / steps;
                    
                    let newX = player.x;
                    let newY = player.y;

                    for(let i=0; i<steps; i++) {
                        let tempX = newX + stepX;
                        let tempY = newY + stepY;
                        let collision = false;

                        // Limites del mapa
                        if(tempX < -mapSize/2 + 15 || tempX > mapSize/2 - 15) collision = true;
                        if(tempY < -mapSize/2 + 15 || tempY > mapSize/2 - 15) collision = true;

                        // Estructuras
                        if(!collision) {
                            for(let w of structures) {
                                if(rectIntersect(tempX-15, tempY-15, 30, 30, w.x-w.w/2, w.y-w.h/2, w.w, w.h)) {
                                    collision = true;
                                    break;
                                }
                            }
                        }

                        if(collision) break; // Si choca, se detiene ahí
                        newX = tempX;
                        newY = tempY;
                    }

                    player.x = newX;
                    player.y = newY;
                    
                    canDash = false; setTimeout(() => canDash = true, dashCooldownTime); dashAnimationStartTime = Date.now();
                }
            }
            keys[e.code] = true;
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        document.getElementById('resume-btn').addEventListener('click', resumeGame);

        // Lógica Principal
        function update() {
            if(!gameStarted || isPaused) return;

            // UI Barras
            let dashElapsed = Date.now() - dashAnimationStartTime; 
            document.getElementById('dash-bar').style.width = (dashElapsed < dashCooldownTime) ? ((dashElapsed / dashCooldownTime) * 100) + '%' : '100%';
            let shieldElapsed = Date.now() - shieldActivationTime; 
            const sBar = document.getElementById('shield-bar');
            if (isShieldActive) { 
                let rem = shieldDuration - shieldElapsed; 
                if (rem <= 0) { isShieldActive = false; } 
                sBar.style.width = Math.max(0, (rem / shieldDuration) * 100) + '%'; sBar.style.background = '#00aaff'; 
                if (currentGameMode === 'april-normal') { player.hp -= 10/60; updateUI(); }
            } else { 
                let rech = shieldElapsed - shieldDuration, cool = shieldCooldown - shieldDuration; 
                if (rech < cool && rech > 0) { sBar.style.width = ((rech / cool) * 100) + '%'; sBar.style.background = '#aaaaaa'; } 
                else { sBar.style.width = '100%'; sBar.style.background = '#ffffff'; } 
            }
            let botiCooldown = (currentGameMode === 'lava') ? 2000 : 5000;
            document.getElementById('weapon-bar').style.width = Math.min(100, ((Date.now() - lastMedkitTime) / botiCooldown) * 100) + '%';

            if(shakeIntensity > 0) shakeIntensity *= 0.9;

            // Spawn Pasivo
            if (currentGameMode !== 'dyd') {
                let spawnDelay = isExtremeMode ? 2500 : 5000;
                if (Date.now() - lastPassiveSpawn > spawnDelay && enemies.length < (isExtremeMode ? 25 : 12)) { 
                    spawnEnemy(player.kills > 0 && player.kills % 5 === 0); 
                    if (currentGameMode === 'double') spawnEnemy(); lastPassiveSpawn = Date.now(); 
                }
            }

            // Cámara y Movimiento Jugador
            camera.targetZoom = player.isAiming ? parseFloat(document.getElementById('fov-slider').value)/100 + 0.5 : parseFloat(document.getElementById('fov-slider').value)/100;
            camera.zoom += (camera.targetZoom - camera.zoom) * 0.1;
            
            let wx = (mouse.x - width/2) / camera.zoom + camera.x;
            let wy = (mouse.y - height/2) / camera.zoom + camera.y;
            player.angle = Math.atan2(wy - player.y, wx - player.x);

            if(isShooting && (Date.now() - player.lastShot > player.cooldown)) fireBullet(false);

            let moveSpd = player.isAiming ? 2.5 : 5.0;
            let px = player.x, py = player.y;
            if(keys['KeyW']) py -= moveSpd; if(keys['KeyS']) py += moveSpd;
            if(keys['KeyA']) px -= moveSpd; if(keys['KeyD']) px += moveSpd;
            
            let cx = true, cy = true;
            for (let w of structures) { 
                if (rectIntersect(px-15, player.y-15, 30, 30, w.x-w.w/2, w.y-w.h/2, w.w, w.h)) cx = false; 
                if (rectIntersect(player.x-15, py-15, 30, 30, w.x-w.w/2, w.y-w.h/2, w.w, w.h)) cy = false; 
            }
            if(px < -mapSize/2 + 15 || px > mapSize/2 - 15) cx = false;
            if(py < -mapSize/2 + 15 || py > mapSize/2 - 15) cy = false;
            
            if (cx) player.x = px; if (cy) player.y = py;

            camera.x += (player.x - camera.x) * 0.2;
            camera.y += (player.y - camera.y) * 0.2;

            // Balas
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]; if (Date.now() - b.startTime > 6000) { bullets.splice(i, 1); continue; }
                b.x += b.vx; b.y += b.vy; let hit = false;
                
                for (let w of structures) {
                    if (rectIntersect(b.x-b.radius, b.y-b.radius, b.radius*2, b.radius*2, w.x-w.w/2, w.y-w.h/2, w.w, w.h)) { 
                        let sniperPresent = enemies.some(e => e.isSniper);
                        let canPass = sniperPresent && (!b.isEnemy || b.isSniperBullet);
                        if (!canPass) { bullets.splice(i, 1); hit = true; break; }
                    }
                }
                if (hit) continue;

                if(!b.isEnemy) {
                    for (let ei = enemies.length - 1; ei >= 0; ei--) {
                        const en = enemies[ei];
                        let dx = b.x - en.x, dy = b.y - en.y;
                        if(Math.sqrt(dx*dx + dy*dy) < en.hitRadius) {
                            en.hp -= player.dmg; bullets.splice(i, 1);
                            if(en.hp <= 0) { 
                                if (en.isAtomic) killedAtomic = true; if (en.isStalkerBoss) killedStalkerBoss = true;
                                if (en.isBoss && !en.isStalkerBoss && !en.isAtomic && !en.isStalkazeBoss) killedNormalBoss = true;
                                createDeathParticles(en.x, en.y, en.colorHex); 
                                if (currentGameMode === 'double' && !en.isSmall) { spawnEnemy(false, false, en.x+20, en.y, true, en); spawnEnemy(false, false, en.x-20, en.y, true, en); }
                                player.kills++; player.dmg += isExtremeMode ? 1.25 : 2; player.cooldown = Math.max(200, player.cooldown - (isExtremeMode ? 37.5 : 50)); 
                                enemyBaseHp += 10; enemies.splice(ei, 1); if (currentGameMode === 'infection') infectionTime += 5; updateUI(); 
                            } break;
                        }
                    }
                } else {
                    let dx = b.x - player.x, dy = b.y - player.y;
                    if(Math.sqrt(dx*dx + dy*dy) < player.radius + b.radius) { 
                        if (currentGameMode === 'april-normal') {
                            if (player.hp < 150) { 
                                player.hp = Math.min(150, player.hp + (b.isSniperBullet ? 50 : (b.isBossBullet ? 30 : 15))); 
                                triggerFlash(0.4, 100, '#2ecc71'); 
                            }
                        } else if (!isShieldActive) { 
                            let dmgTaken = b.isBossBullet ? (isExtremeMode ? 60 : 30) : (isExtremeMode ? 20 : 15);
                            if (b.isSniperBullet) dmgTaken = Math.random() < 0.25 ? 150 : 50;
                            player.hp -= dmgTaken; triggerFlash(0.5); shakeIntensity = 10; 
                        } 
                        updateUI(); bullets.splice(i, 1); 
                    }
                }
            }

            // Enemigos
            let now = Date.now();
            for (let ei = enemies.length - 1; ei >= 0; ei--) {
                const en = enemies[ei];
                let dx = player.x - en.x, dy = player.y - en.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                en.angle = Math.atan2(dy, dx);
                if (currentGameMode === 'un-toque') en.hp = 1;
                
                if (en.isSniper) {
                    if (now - en.lastShot > 5400) { 
                        if (en.aimStart === 0) en.aimStart = now;
                        let aimTime = now - en.aimStart;
                        if (aimTime >= 3000) { 
                            let fDirX = dx/dist, fDirY = dy/dist;
                            fireBullet(true, en.x, en.y, fDirX, fDirY, false, true); 
                            en.lastShot = now; en.aimStart = 0;
                        }
                    } else en.aimStart = 0;
                    continue; 
                }

                let isStalkaze = en.isStalkazeBoss || en.isStalkazeMinion;
                if (isStalkaze) en.speed = isShieldActive ? (en.isStalkazeBoss ? 1.0 : 2.0) : en.baseSpeed;
                
                en.x += Math.cos(en.angle) * en.speed; en.y += Math.sin(en.angle) * en.speed;
                
                if (en.isKamikaze) {
                    if (dist < 25) {
                        if (currentGameMode === 'april-normal') {
                            if (player.hp < 150) { player.hp = Math.min(150, player.hp + (en.isImmortal ? 50 : en.meleeDmg)); triggerFlash(0.4, 100, '#2ecc71'); }
                        } else if (!isShieldActive) { player.hp -= en.meleeDmg; triggerFlash(0.7); shakeIntensity = 15; } 
                        else audioBlockHit.cloneNode().play();
                        updateUI(); createDeathParticles(en.x, en.y, en.colorHex); enemies.splice(ei, 1); continue;
                    }
                } else if (isStalkaze) {
                    if (dist < 30) {
                        if (currentGameMode === 'april-normal') {
                            if (player.hp < 150) { player.hp = Math.min(150, player.hp + en.meleeDmg); triggerFlash(0.4, 100, '#2ecc71'); }
                        } else if (!isShieldActive) {
                            player.hp -= en.meleeDmg; triggerFlash(0.7); shakeIntensity = 15; updateUI();
                        }
                        createDeathParticles(en.x, en.y, en.colorHex); enemies.splice(ei, 1); continue;
                    }
                    if (dist < 400 && now - en.lastShot > (en.isBoss ? 2500 : 1800)) { 
                        fireBullet(true, en.x, en.y, dx/dist, dy/dist, en.isBoss); en.lastShot = now; 
                    }
                } else if (en.isStalker || en.isStalkerBoss || currentGameMode === 'dyd' || en.isImmortal) { 
                    if (dist < 35 && now - en.lastMelee > 2340) { 
                        if (currentGameMode === 'april-normal') {
                            if (player.hp < 150) { player.hp = Math.min(150, player.hp + (en.isImmortal ? 50 : en.meleeDmg)); triggerFlash(0.4, 100, '#2ecc71'); }
                        } else if (!isShieldActive) { player.hp -= en.meleeDmg; triggerFlash(0.5); } 
                        updateUI(); en.lastMelee = now; 
                    } 
                } else { 
                    if(dist < 400 && now - en.lastShot > (en.isBoss ? 2500 : 1800)) { 
                        fireBullet(true, en.x, en.y, dx/dist, dy/dist, en.isBoss); en.lastShot = now; 
                    } 
                }
            }

            // Cofres
            for(let i = chests.length-1; i>=0; i--) {
                let ch = chests[i];
                let dx = player.x - ch.x, dy = player.y - ch.y;
                if(Math.sqrt(dx*dx + dy*dy) < 30) {
                    chests.splice(i, 1); 
                    if (currentGameMode === 'april-normal') { player.hp -= 25; triggerFlash(0.5); } else { player.medkits++; }
                    updateUI(); setTimeout(spawnChest, (currentGameMode === 'double' || currentGameMode === 'lava') ? 20000 : 12000); 
                }
            }

            // Partículas
            for(let i=particles.length-1; i>=0; i--) { 
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02; 
                if(p.life <= 0) particles.splice(i, 1); 
            }
        }

        // Renderizado
        function getSkinColor(type, en) {
            let actualSkin = currentSkin;
            if (currentSkin === 'gemininopuedemas') {
                actualSkin = 'gemininopuedemas';
            }
            const s = skinColors[actualSkin] || skinColors['default'];

            if(type === 'player') return s.player;
            if(type === 'eye') return s.eye;
            if(type === 'gun') return s.gun;
            
            if(currentSkin === 'racism') return 0xe74c3c;
            if(en && en.isSniper) {
                if(currentSkin === 'rgb') { let c = [0x000000, 0x808080, 0xffffff]; return c[Math.floor(Date.now()/1000)%3]; }
                return 0x808080;
            }
            if(currentSkin === 'rgb') {
                let hues = [0, 60, 120, 180, 240, 300];
                return `hsl(${hues[Math.floor(Date.now()/500)%6]}, 100%, 50%)`;
            }
            if(currentSkin === 'holograma') {
                return (en && (en.isStalker || en.isStalkerBoss)) ? 0x88ffff : ((en && (en.isKamikaze || en.isAtomic)) ? 0x004444 : 0x00ffff);
            }
            if(en) {
                if(en.isImmortal) return 0xffffff;
                if(en.isAtomic) return s.atomic;
                if(en.isKamikaze) return currentSkin === 'retro_1_5' ? 0xbbbbbb : 0x440000;
                if(en.isStalkazeBoss || en.isStalkazeMinion) return 0x8e44ad;
                return en.isStalker ? s.stalker : s.enemy;
            }
            return s.enemy;
        }

        function draw() {
            ctx.fillStyle = bgColor; ctx.fillRect(0, 0, width, height);
            
            ctx.save();
            let sx = (Math.random()-0.5)*shakeIntensity, sy = (Math.random()-0.5)*shakeIntensity;
            ctx.translate(width/2 - camera.x * camera.zoom + sx, height/2 - camera.y * camera.zoom + sy);
            ctx.scale(camera.zoom, camera.zoom);

            // Suelo y limites
            ctx.fillStyle = floorColor; ctx.fillRect(-mapSize/2, -mapSize/2, mapSize, mapSize);
            ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 5; ctx.strokeRect(-mapSize/2, -mapSize/2, mapSize, mapSize);

            // Estructuras
            ctx.fillStyle = structColor;
            for(let w of structures) { ctx.fillRect(w.x - w.w/2, w.y - w.h/2, w.w, w.h); }

            // Cofres
            ctx.fillStyle = '#2ecc71';
            for(let ch of chests) { ctx.fillRect(ch.x-10, ch.y-10, 20, 20); }

            // Partículas
            for(let p of particles) {
                ctx.fillStyle = typeof p.color === 'string' ? p.color : hexToColor(p.color);
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x-3, p.y-3, 6, 6);
                ctx.globalAlpha = 1.0;
            }

            // Balas
            for(let b of bullets) {
                ctx.fillStyle = b.isEnemy ? (b.isSniperBullet ? '#808080' : '#ff0000') : '#ffff00';
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
            }

            const s = skinColors[currentSkin === 'gemininopuedemas' ? 'gemininopuedemas' : currentSkin] || skinColors['default'];
            const isHolo = currentSkin === 'holograma';

            // Enemigos
            for(let en of enemies) {
                ctx.save(); ctx.translate(en.x, en.y); ctx.rotate(en.angle);
                let eColor = getSkinColor('enemy', en);
                ctx.fillStyle = typeof eColor === 'string' ? eColor : hexToColor(eColor);
                ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 2;
                
                let size = 30 * en.mult;
                if(isHolo) ctx.strokeRect(-size/2, -size/2, size, size);
                else ctx.fillRect(-size/2, -size/2, size, size);
                
                // Ojos / Visor (según skin)
                if(currentSkin === 'retro') {
                    ctx.fillStyle = '#ffff00'; ctx.fillRect(size/2 - 5, -size/3, 5, size/4); ctx.fillRect(size/2 - 5, size/3 - size/4, 5, size/4);
                } else if(currentSkin !== 'retro_2' && currentSkin !== 'retro_1_5') {
                    ctx.fillStyle = '#ffffff'; // Visor blanco para los demas
                    ctx.fillRect(size/2 - 5, -size/4, 10, size/2); 
                }

                if(en.isSniper && en.aimStart > 0 && (Date.now() - en.aimStart >= 1500)) {
                    ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(0,0);
                    let distToPlayer = Math.sqrt((player.x-en.x)**2 + (player.y-en.y)**2);
                    ctx.lineTo(distToPlayer, 0); ctx.stroke();
                }
                ctx.restore();
            }

            // Jugador (Si no estamos en DYD o april normal sin arma, lo mostramos igual para entender donde estamos)
            ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
            ctx.fillStyle = hexToColor(s.player); ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 2;
            if(isHolo) ctx.strokeRect(-15, -15, 30, 30); else ctx.fillRect(-15, -15, 30, 30);
            
            ctx.fillStyle = hexToColor(s.eye);
            if(isHolo) ctx.strokeRect(10, -5, 10, 10); else ctx.fillRect(10, -5, 10, 10);
            
            if(currentGameMode !== 'dyd' && currentGameMode !== 'april-normal') {
                ctx.fillStyle = hexToColor(s.gun);
                if(isHolo) ctx.strokeRect(15, 5, 20, 6); else ctx.fillRect(15, 5, 20, 6);
            }

            if(isShieldActive) {
                ctx.strokeStyle = 'rgba(0, 170, 255, 0.5)'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.stroke();
            }
            ctx.restore();
            ctx.restore();
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            update();
            draw();
        }
        
        gameLoop();
    </script>
</body>
</html>
